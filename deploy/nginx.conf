server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash: cache largo
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
